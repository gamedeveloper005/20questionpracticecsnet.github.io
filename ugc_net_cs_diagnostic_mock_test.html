
<style>
.opt-row:hover { background: var(--color-background-secondary) !important; }
.nav-btn:hover { opacity: 0.85; }
.q-box:hover { border-color: #378add !important; }
</style>
<h2 class="sr-only">UGC NET JRF Computer Science Diagnostic Mock Test — 20 questions across 10 units with timer and unit-wise results</h2>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const TOTAL_TIME = 30 * 60;

const QS = [
  { u:1, un:"Discrete Structures & Optimization",
    q:"The order of an element 'a' in a group (G, *) is defined as:",
    opts:["Total number of elements in G","Smallest positive integer n such that aⁿ = e (identity)","Number of subgroups generated by a","Index of cyclic subgroup ⟨a⟩ in G"],
    ans:1, exp:"Order of a = smallest n > 0 such that aⁿ = e. This is a fundamental definition in group theory." },
  { u:1, un:"Discrete Structures & Optimization",
    q:"The number of edges in complete bipartite graph K₃,₄ is:",
    opts:["7","10","12","6"],
    ans:2, exp:"K_{m,n} has m × n edges. K₃,₄ = 3 × 4 = 12 edges." },
  { u:2, un:"Computer System Architecture",
    q:"In 8-bit 2's complement representation, the decimal value −1 is:",
    opts:["10000001","11111110","11111111","10000000"],
    ans:2, exp:"1 = 00000001. 1's complement = 11111110. Add 1 → 11111111. So −1₁₀ = 11111111₂." },
  { u:2, un:"Computer System Architecture",
    q:"In direct-mapped cache with 16 cache lines, block address 35 maps to:",
    opts:["Line 3","Line 35","Line 19","Line 2"],
    ans:0, exp:"Cache line = block address mod cache size. 35 mod 16 = 3 → Line 3." },
  { u:3, un:"Programming Languages & Computer Graphics",
    q:"Which of the following is a purely functional programming language?",
    opts:["Python","Java","Haskell","Prolog"],
    ans:2, exp:"Haskell is purely functional. Python/Java are multi-paradigm. Prolog is a logic programming language." },
  { u:3, un:"Programming Languages & Computer Graphics",
    q:"In Cohen-Sutherland line clipping, a line segment is trivially accepted when:",
    opts:["Logical OR of both endpoint codes is nonzero","Logical AND of both endpoint codes is nonzero","Logical AND of both endpoint codes is zero","Both codes are identical and nonzero"],
    ans:2, exp:"Trivially accepted: both points are inside the window (both codes = 0000), so bitwise AND = 0. Trivially rejected: AND ≠ 0." },
  { u:4, un:"Database Management Systems",
    q:"A relation is in BCNF if for every non-trivial functional dependency X → Y:",
    opts:["Y must be a prime attribute","X must be a superkey","X must be a prime attribute","Y must not be a key attribute"],
    ans:1, exp:"BCNF definition: for every non-trivial FD X → Y, X must be a superkey of the relation." },
  { u:4, un:"Database Management Systems",
    q:"Which isolation level prevents 'dirty reads' but still allows 'non-repeatable reads'?",
    opts:["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"],
    ans:1, exp:"READ COMMITTED prevents dirty reads (reading uncommitted data) but allows non-repeatable reads. REPEATABLE READ prevents both." },
  { u:5, un:"System Software & Operating Systems",
    q:"Which page replacement algorithm is known to suffer from Bélády's anomaly?",
    opts:["Optimal (OPT)","LRU","FIFO","Clock (Second-Chance)"],
    ans:2, exp:"FIFO suffers Bélády's anomaly — more frames can cause more page faults. LRU and OPT are stack algorithms; they do not." },
  { u:5, un:"System Software & Operating Systems",
    q:"In Banker's algorithm, the system is in a safe state when:",
    opts:["All processes can execute simultaneously","At least one execution sequence exists in which all processes complete","No process is in the waiting state","All allocated resources are actively used"],
    ans:1, exp:"Safe state = at least one safe sequence exists — an ordering where each process can complete using available resources." },
  { u:6, un:"Software Engineering",
    q:"Cyclomatic Complexity for a graph with E=10 edges, N=7 nodes, P=1 component is:",
    opts:["3","4","5","6"],
    ans:2, exp:"V(G) = E − N + 2P = 10 − 7 + 2(1) = 5." },
  { u:6, un:"Software Engineering",
    q:"Which testing technique derives test cases from the internal structure and code?",
    opts:["Black-box testing","Regression testing","White-box testing","Acceptance testing"],
    ans:2, exp:"White-box (structural/glass-box) testing uses internal code structure to design test cases. Black-box ignores internals." },
  { u:7, un:"Data Structures & Algorithms",
    q:"The worst-case time complexity of Quicksort is:",
    opts:["O(n log n)","O(n²)","O(n)","O(n log² n)"],
    ans:1, exp:"Quicksort worst case (already sorted with naive pivot) = O(n²). Average case = O(n log n)." },
  { u:7, un:"Data Structures & Algorithms",
    q:"After inserting a new element into a min-heap, which operation restores the heap property?",
    opts:["Heapify-down (sift root downward)","Heapify-up (sift new element upward)","AVL rotation","In-order rebalancing"],
    ans:1, exp:"Insert at end of heap, then heapify-up (bubble-up): repeatedly compare with parent and swap if smaller." },
  { u:8, un:"Theory of Computation & Compilers",
    q:"The language L = {aⁿbⁿcⁿ | n ≥ 1} belongs to which class?",
    opts:["Regular languages","Context-Free but not Regular","Context-Sensitive but not Context-Free","Recursively Enumerable but not Recursive"],
    ans:2, exp:"aⁿbⁿcⁿ is the classic example of a context-sensitive (but NOT context-free) language, shown via the pumping lemma for CFLs." },
  { u:8, un:"Theory of Computation & Compilers",
    q:"Which parsing strategy uses a stack and constructs rightmost derivation in reverse?",
    opts:["LL(1) parsing","Recursive descent parsing","LR parsing","Predictive top-down parsing"],
    ans:2, exp:"LR (Left-to-right, Rightmost derivation in reverse) is the classic bottom-up shift-reduce parsing method." },
  { u:9, un:"Data Communication & Computer Networks",
    q:"In the OSI model, which layer establishes, maintains, and terminates sessions?",
    opts:["Transport Layer (Layer 4)","Session Layer (Layer 5)","Presentation Layer (Layer 6)","Application Layer (Layer 7)"],
    ans:1, exp:"Session Layer (Layer 5) manages session establishment, synchronization, and termination between application processes." },
  { u:9, un:"Data Communication & Computer Networks",
    q:"The correct sequence for TCP three-way handshake is:",
    opts:["SYN → ACK → SYN-ACK","ACK → SYN → SYN-ACK","SYN → SYN-ACK → ACK","SYN-ACK → SYN → FIN"],
    ans:2, exp:"Client sends SYN → Server responds SYN-ACK → Client sends ACK. This completes connection establishment." },
  { u:10, un:"Artificial Intelligence",
    q:"In A* search, heuristic h(n) is admissible when:",
    opts:["h(n) = 0 for all nodes n","h(n) never overestimates actual cost to reach the goal","h(n) always overestimates actual cost","g(n) = 0 for all nodes n"],
    ans:1, exp:"Admissible heuristic = never overestimates real cost to goal. This guarantees A* finds the optimal solution." },
  { u:10, un:"Artificial Intelligence",
    q:"Which of the following is an unsupervised learning algorithm?",
    opts:["Decision Tree","Linear Regression","K-Means Clustering","Support Vector Machine"],
    ans:2, exp:"K-Means is unsupervised — clusters data without labeled examples. Decision Tree, Linear Regression, and SVM are supervised." }
];

const UNAMES = {1:"Discrete Structures",2:"Computer Architecture",3:"Programming Languages",4:"DBMS",5:"Operating Systems",6:"Software Engg.",7:"DSA",8:"Theory of Computation",9:"Computer Networks",10:"Artificial Intelligence"};

const SCOL = {
  fresh:{bg:"var(--color-background-secondary)",tx:"var(--color-text-tertiary)",bd:"var(--color-border-tertiary)"},
  visited:{bg:"#fee2e2",tx:"#991b1b",bd:"#fca5a5"},
  answered:{bg:"#dcfce7",tx:"#166534",bd:"#86efac"},
  marked:{bg:"#fef3c7",tx:"#92400e",bd:"#fde68a"},
  markedAns:{bg:"#ede9fe",tx:"#6d28d9",bd:"#c4b5fd"}
};

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function getSt(i,ans,vis,mrk){
  const a=ans[i]!==undefined,m=mrk.has(i),v=vis.has(i);
  if(m&&a)return"markedAns";if(m)return"marked";if(a)return"answered";if(v)return"visited";return"fresh";
}

function App(){
  const [scr,setScr]=useState("start");
  const [cur,setCur]=useState(0);
  const [ans,setAns]=useState({});
  const [vis,setVis]=useState(new Set());
  const [mrk,setMrk]=useState(new Set());
  const [tl,setTl]=useState(TOTAL_TIME);
  const [cfm,setCfm]=useState(false);
  const [rev,setRev]=useState(false);
  const tmr=useRef(null);

  const submit=useCallback(()=>{clearInterval(tmr.current);setCfm(false);setScr("results");},[]);

  useEffect(()=>{
    if(scr!=="exam")return;
    tmr.current=setInterval(()=>{setTl(t=>{if(t<=1){submit();return 0;}return t-1;});},1000);
    return()=>clearInterval(tmr.current);
  },[scr,submit]);

  const goto=useCallback((i)=>{setCur(i);setVis(v=>new Set([...v,i]));},[]);

  if(scr==="start"){
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--color-background-tertiary)",padding:20,fontFamily:"var(--font-sans)"}},
      React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:16,border:"0.5px solid var(--color-border-tertiary)",padding:"32px 36px",maxWidth:520,width:"100%"}},
        React.createElement("div",{style:{textAlign:"center",marginBottom:28}},
          React.createElement("div",{style:{width:56,height:56,borderRadius:"50%",background:"#dbeafe",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24,color:"#0c447c"}},"🎓"),
          React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:6}},"UGC NET JRF"),
          React.createElement("h1",{style:{margin:"0 0 6px",fontSize:20,fontWeight:500,color:"var(--color-text-primary)"}},"Computer Science & Applications"),
          React.createElement("p",{style:{margin:0,fontSize:13,color:"var(--color-text-secondary)"}},"Diagnostic mock — all 10 units · identify weak areas")
        ),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:22}},
          [["📝","Questions","20 MCQs"],["⏱️","Duration","30 minutes"],["✅","Per correct","+2 marks"],["🎯","Purpose","Find weak units"]].map(([ic,lb,vl])=>
            React.createElement("div",{key:lb,style:{background:"var(--color-background-secondary)",borderRadius:8,padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}},
              React.createElement("span",{style:{fontSize:18}}),
              React.createElement("span",{style:{fontSize:20,lineHeight:1}},ic),
              React.createElement("div",null,
                React.createElement("div",{style:{fontSize:10,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.5px"}},lb),
                React.createElement("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}},vl)
              )
            )
          )
        ),
        React.createElement("div",{style:{background:"#fffbeb",border:"0.5px solid #fcd34d",borderRadius:8,padding:"12px 14px",marginBottom:22}},
          React.createElement("div",{style:{fontSize:12,fontWeight:500,color:"#92400e",marginBottom:6}},"How this works"),
          React.createElement("div",{style:{fontSize:12,color:"#78350f",lineHeight:1.7}},"Answer all 20 questions across 10 units → submit → your weak areas are identified → I'll create targeted drill questions until you're exam-ready.")
        ),
        React.createElement("button",{onClick:()=>{setScr("exam");goto(0);},style:{width:"100%",padding:14,background:"#0c447c",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:500,cursor:"pointer"}},"Begin diagnostic test →")
      )
    );
  }

  if(scr==="results"){
    let cor=0,wrg=0,att=0;
    const bu={};for(let i=1;i<=10;i++)bu[i]={c:0,w:0,t:0};
    QS.forEach((q,i)=>{bu[q.u].t++;if(ans[i]!==undefined){att++;if(ans[i]===q.ans){cor++;bu[q.u].c++;}else{wrg++;bu[q.u].w++;}}});
    const sc=cor*2,mx=QS.length*2,pc=Math.round(sc/mx*100);
    const rows=Object.entries(bu).map(([u,d])=>{
      const p=d.t>0?d.c/d.t:0;
      const s=p>=0.75?{lb:"Strong ✅",col:"#166534",bg:"#dcfce7",bd:"#86efac"}:p>=0.5?{lb:"Moderate ⚠️",col:"#92400e",bg:"#fef3c7",bd:"#fde68a"}:{lb:"Weak ❌",col:"#991b1b",bg:"#fee2e2",bd:"#fca5a5"};
      return{u:parseInt(u),nm:UNAMES[u],...d,p,s};
    }).sort((a,b)=>a.p-b.p);
    const weak=rows.filter(r=>r.p<0.5);
    const wkList=weak.length>0?weak.map(r=>`Unit ${r.u} (${r.nm})`).join(", "):"none — great performance!";

    return React.createElement("div",{style:{fontFamily:"var(--font-sans)",background:"var(--color-background-tertiary)",minHeight:"100vh",padding:16}},
      React.createElement("div",{style:{maxWidth:660,margin:"0 auto"}},

        React.createElement("div",{style:{background:"#0c447c",borderRadius:14,padding:"20px 22px",color:"white",textAlign:"center",marginBottom:14}},
          React.createElement("div",{style:{fontSize:36,marginBottom:8}}),
          React.createElement("span",{style:{fontSize:36}}),
          React.createElement("div",{style:{fontSize:36,marginBottom:8}},sc>=32?"🏆":sc>=20?"📊":"💪"),
          React.createElement("h2",{style:{margin:"0 0 4px",fontSize:19,fontWeight:500}},"Diagnostic complete"),
          React.createElement("div",{style:{opacity:.7,fontSize:13}},"UGC NET JRF — Computer Science & Applications")
        ),

        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:14}},
          [{l:"Score",v:`${sc}/${mx}`,s:`${pc}%`,c:"#0c447c"},{l:"Attempted",v:`${att}/${QS.length}`,s:`${Math.round(att/QS.length*100)}%`,c:"#1e40af"},{l:"Correct",v:cor,s:`+${cor*2} marks`,c:"#166534"},{l:"Wrong",v:wrg,s:"No penalty",c:"#991b1b"}].map(x=>
            React.createElement("div",{key:x.l,style:{background:"var(--color-background-primary)",borderRadius:8,border:"0.5px solid var(--color-border-tertiary)",padding:"12px 14px",borderTop:`3px solid ${x.c}`}},
              React.createElement("div",{style:{fontSize:10,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.5px"}},x.l),
              React.createElement("div",{style:{fontSize:22,fontWeight:500,color:x.c}},x.v),
              React.createElement("div",{style:{fontSize:11,color:"var(--color-text-tertiary)"}},x.s)
            )
          )
        ),

        React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:14,border:"0.5px solid var(--color-border-tertiary)",padding:"18px 20px",marginBottom:14}},
          React.createElement("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-primary)",marginBottom:14}},"Unit-wise performance"),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            rows.map(r=>
              React.createElement("div",{key:r.u,style:{borderRadius:8,padding:"10px 12px",background:r.s.bg,border:`0.5px solid ${r.s.bd}`}},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
                  React.createElement("div",null,
                    React.createElement("span",{style:{fontSize:10,color:r.s.col,fontWeight:500,marginRight:6}},`Unit ${r.u}`),
                    React.createElement("span",{style:{fontSize:13,color:"var(--color-text-primary)"}},r.nm)
                  ),
                  React.createElement("span",{style:{fontSize:11,fontWeight:500,color:r.s.col}},`${r.s.lb} · ${r.c}/${r.t}`)
                ),
                React.createElement("div",{style:{height:5,background:"rgba(0,0,0,0.1)",borderRadius:3,overflow:"hidden"}},
                  React.createElement("div",{style:{height:"100%",width:`${r.p*100}%`,background:r.s.col,borderRadius:3}})
                )
              )
            )
          )
        ),

        React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:14,border:"0.5px solid var(--color-border-tertiary)",padding:"14px 18px",marginBottom:14}},
          React.createElement("button",{onClick:()=>setRev(x=>!x),style:{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",background:"none",border:"none",cursor:"pointer",padding:0}},
            React.createElement("span",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-primary)"}},"Review all answers & explanations"),
            React.createElement("span",{style:{fontSize:18,color:"var(--color-text-secondary)"}},rev?"▲":"▼")
          ),
          rev&&React.createElement("div",{style:{marginTop:14,display:"flex",flexDirection:"column",gap:8}},
            QS.map((q,i)=>{
              const ch=ans[i],ok=ch===q.ans,na=ch===undefined;
              return React.createElement("div",{key:i,style:{borderRadius:8,padding:"12px 14px",background:na?"var(--color-background-secondary)":ok?"#dcfce7":"#fee2e2",border:`0.5px solid ${na?"var(--color-border-tertiary)":ok?"#86efac":"#fca5a5"}`}},
                React.createElement("div",{style:{display:"flex",gap:8}},
                  React.createElement("span",{style:{fontSize:16,flexShrink:0,marginTop:1}},na?"⬜":ok?"✅":"❌"),
                  React.createElement("div",{style:{flex:1}},
                    React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",marginBottom:2}},`Q${i+1} · Unit ${q.u}: ${q.un}`),
                    React.createElement("div",{style:{fontSize:12,color:"var(--color-text-primary)",marginBottom:5}},q.q),
                    !na&&!ok&&React.createElement("div",{style:{fontSize:11,color:"#b91c1c",marginBottom:2}},`Your answer: (${["A","B","C","D"][ch]}) ${q.opts[ch]}`),
                    React.createElement("div",{style:{fontSize:11,color:"#166534",marginBottom:4}},`✓ Correct: (${["A","B","C","D"][q.ans]}) ${q.opts[q.ans]}`),
                    React.createElement("div",{style:{fontSize:11,color:"var(--color-text-secondary)",fontStyle:"italic"}},q.exp)
                  )
                )
              );
            })
          )
        ),

        React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:14,border:"0.5px solid var(--color-border-tertiary)",padding:"18px 20px",textAlign:"center"}},
          React.createElement("div",{style:{fontSize:14,fontWeight:500,color:"var(--color-text-primary)",marginBottom:4}},"Ready to fix your weak areas? 💪"),
          React.createElement("div",{style:{fontSize:12,color:"var(--color-text-secondary)",marginBottom:16,lineHeight:1.6}},
            "Weak units: ",React.createElement("strong",null,wkList)
          ),
          React.createElement("button",{
            onClick:()=>{
              const msg=weak.length>0?`I completed the UGC NET CS diagnostic. Score: ${sc}/${mx} (${pc}%). My weak units are: ${wkList}. Please start targeted practice — begin with my weakest unit!`:`I completed the diagnostic. Score: ${sc}/${mx} (${pc}%). I performed well on all units! Let's try harder, advanced questions.`;
              try{sendPrompt(msg);}catch(e){}
            },
            style:{padding:"10px 22px",background:"#0c447c",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer"}
          },"Share results & start practice ↗")
        )
      )
    );
  }

  const q=QS[cur];
  const acnt=Object.keys(ans).length;
  const timeLow=tl<300;
  const selAns=(i)=>setAns(a=>({...a,[cur]:i}));
  const clearAns=()=>setAns(a=>{const n={...a};delete n[cur];return n;});
  const togMrk=()=>setMrk(m=>{const n=new Set(m);n.has(cur)?n.delete(cur):n.add(cur);return n;});

  return React.createElement("div",{style:{fontFamily:"var(--font-sans)",background:"var(--color-background-tertiary)",minHeight:"100vh",position:"relative"}},
    React.createElement("div",{style:{background:"#0c447c",color:"white",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}},
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:13,fontWeight:500}},"UGC NET JRF — Computer Science"),
        React.createElement("div",{style:{fontSize:11,opacity:.7}},`Q ${cur+1} of ${QS.length} · Diagnostic`)
      ),
      React.createElement("div",{style:{display:"flex",gap:12,alignItems:"center"}},
        React.createElement("div",{style:{textAlign:"center"}},
          React.createElement("div",{style:{fontSize:10,opacity:.7}},"ANSWERED"),
          React.createElement("div",{style:{fontSize:16,fontWeight:500}}),
          React.createElement("span",{style:{fontSize:16,fontWeight:500}},`${acnt}/${QS.length}`)
        ),
        React.createElement("div",{style:{background:timeLow?"#b91c1c":"rgba(255,255,255,0.15)",border:timeLow?"1px solid #fca5a5":"1px solid rgba(255,255,255,0.3)",borderRadius:8,padding:"5px 12px",textAlign:"center"}},
          React.createElement("div",{style:{fontSize:10,opacity:.7}},"TIME LEFT"),
          React.createElement("div",{style:{fontSize:18,fontWeight:500,fontFamily:"var(--font-mono)"}},fmt(tl))
        )
      )
    ),
    React.createElement("div",{style:{height:3,background:"rgba(12,68,124,0.15)"}},
      React.createElement("div",{style:{height:"100%",width:`${((cur+1)/QS.length)*100}%`,background:"#0c447c",transition:"width 0.3s"}})
    ),
    React.createElement("div",{style:{display:"flex",alignItems:"flex-start"}},
      React.createElement("div",{style:{flex:1,padding:16,minWidth:0}},
        React.createElement("div",{style:{fontSize:12,color:"#1d4ed8",fontWeight:500,marginBottom:12,padding:"5px 10px",background:"#dbeafe",borderRadius:6,display:"inline-block"}},`Unit ${q.u}: ${q.un}`),
        React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:12,border:"0.5px solid var(--color-border-tertiary)",padding:"18px 20px",marginBottom:14}},
          React.createElement("div",{style:{fontSize:14,color:"var(--color-text-primary)",lineHeight:1.75,marginBottom:18}},
            React.createElement("span",{style:{color:"#0c447c",fontWeight:500,marginRight:6}},`Q${cur+1}.`),q.q
          ),
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
            q.opts.map((opt,i)=>{
              const sel=ans[cur]===i;
              return React.createElement("div",{key:i,className:"q-box",onClick:()=>selAns(i),style:{padding:"10px 14px",borderRadius:8,border:`0.5px solid ${sel?"#0c447c":"var(--color-border-tertiary)"}`,background:sel?"#dbeafe":"var(--color-background-primary)",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:10,transition:"all 0.1s"}},
                React.createElement("div",{style:{width:24,height:24,borderRadius:"50%",flexShrink:0,border:`0.5px solid ${sel?"#0c447c":"var(--color-border-secondary)"}`,background:sel?"#0c447c":"var(--color-background-secondary)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:500,color:sel?"white":"var(--color-text-secondary)",marginTop:1}},["A","B","C","D"][i]),
                React.createElement("span",{style:{fontSize:13,color:"var(--color-text-primary)",lineHeight:1.55,paddingTop:2}},opt)
              );
            })
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
          React.createElement("button",{className:"nav-btn",onClick:togMrk,style:{padding:"7px 13px",borderRadius:8,border:`0.5px solid ${mrk.has(cur)?"#d97706":"var(--color-border-secondary)"}`,background:mrk.has(cur)?"#fef3c7":"var(--color-background-primary)",color:mrk.has(cur)?"#92400e":"var(--color-text-secondary)",fontSize:12,fontWeight:500,cursor:"pointer"}},mrk.has(cur)?"★ Marked":"☆ Mark for review"),
          React.createElement("button",{className:"nav-btn",onClick:clearAns,style:{padding:"7px 13px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-secondary)",fontSize:12,fontWeight:500,cursor:"pointer"}},"Clear"),
          React.createElement("div",{style:{flex:1}}),
          cur>0&&React.createElement("button",{className:"nav-btn",onClick:()=>goto(cur-1),style:{padding:"7px 13px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-secondary)",fontSize:12,fontWeight:500,cursor:"pointer"}},"← Prev"),
          cur<QS.length-1?
            React.createElement("button",{className:"nav-btn",onClick:()=>goto(cur+1),style:{padding:"7px 14px",borderRadius:8,border:"0.5px solid #0c447c",background:"#dbeafe",color:"#0c447c",fontSize:12,fontWeight:500,cursor:"pointer"}},"Next →"):
            React.createElement("button",{className:"nav-btn",onClick:()=>setCfm(true),style:{padding:"7px 14px",borderRadius:8,border:"none",background:"#166534",color:"white",fontSize:12,fontWeight:500,cursor:"pointer"}},"✓ Submit Test")
        )
      ),
      React.createElement("div",{style:{width:175,flexShrink:0,padding:"12px 10px",background:"var(--color-background-primary)",borderLeft:"0.5px solid var(--color-border-tertiary)",minHeight:"calc(100vh - 68px)"}},
        React.createElement("div",{style:{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}},"Status"),
        [{l:"Answered",c:acnt,cl:"#166534"},{l:"Not answered",c:Math.max(0,vis.size-acnt),cl:"#991b1b"},{l:"Not visited",c:QS.length-vis.size,cl:"var(--color-text-tertiary)"},{l:"Marked",c:mrk.size,cl:"#92400e"}].map(s=>
          React.createElement("div",{key:s.l,style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
            React.createElement("span",{style:{color:"var(--color-text-secondary)"}},s.l),
            React.createElement("span",{style:{fontWeight:500,color:s.cl}},s.c)
          )
        ),
        React.createElement("div",{style:{height:"0.5px",background:"var(--color-border-tertiary)",margin:"10px 0"}}),
        React.createElement("div",{style:{fontSize:10,fontWeight:500,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}},"Questions"),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:3}},
          QS.map((_,i)=>{
            const st=getSt(i,ans,vis,mrk);
            const ss=SCOL[st];
            return React.createElement("div",{key:i,onClick:()=>goto(i),style:{height:26,borderRadius:4,border:i===cur?`2px solid #0c447c`:`0.5px solid ${ss.bd}`,background:ss.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:500,color:ss.tx,cursor:"pointer"}},i+1);
          })
        ),
        React.createElement("div",{style:{marginTop:10,fontSize:10,color:"var(--color-text-tertiary)",lineHeight:1.9}},
          [["#dcfce7","#86efac","#166534","Answered"],["#fee2e2","#fca5a5","#991b1b","Not answered"],["var(--color-background-secondary)","var(--color-border-tertiary)","var(--color-text-tertiary)","Not visited"],["#fef3c7","#fde68a","#92400e","Marked"],["#ede9fe","#c4b5fd","#6d28d9","Marked+ans"]].map(([bg,bd,tx,lb])=>
            React.createElement("div",{key:lb,style:{display:"flex",alignItems:"center",gap:5}},
              React.createElement("div",{style:{width:8,height:8,borderRadius:2,background:bg,border:`0.5px solid ${bd}`,flexShrink:0}}),
              React.createElement("span",null,lb)
            )
          )
        ),
        React.createElement("div",{style:{height:"0.5px",background:"var(--color-border-tertiary)",margin:"10px 0"}}),
        React.createElement("button",{className:"nav-btn",onClick:()=>setCfm(true),style:{width:"100%",padding:"8px",borderRadius:8,background:"#166534",color:"white",border:"none",fontSize:12,fontWeight:500,cursor:"pointer"}},"Submit Test")
      )
    ),

    cfm&&React.createElement("div",{style:{position:"absolute",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:120,zIndex:50}},
      React.createElement("div",{style:{background:"var(--color-background-primary)",borderRadius:16,padding:24,maxWidth:340,width:"90%",textAlign:"center",border:"0.5px solid var(--color-border-tertiary)"}},
        React.createElement("div",{style:{fontSize:32,marginBottom:10}},"📋"),
        React.createElement("div",{style:{fontSize:16,fontWeight:500,color:"var(--color-text-primary)",marginBottom:6}},"Submit test?"),
        React.createElement("div",{style:{fontSize:13,color:"var(--color-text-secondary)",marginBottom:18,lineHeight:1.6}},
          "Answered: ",React.createElement("strong",{style:{color:"#166534"}},acnt),
          " · Unanswered: ",React.createElement("strong",{style:{color:"#991b1b"}},QS.length-acnt)
        ),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("button",{onClick:()=>setCfm(false),style:{flex:1,padding:"9px",borderRadius:8,border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-secondary)",fontWeight:500,cursor:"pointer"}},"Go back"),
          React.createElement("button",{onClick:submit,style:{flex:1,padding:"9px",borderRadius:8,border:"none",background:"#166534",color:"white",fontWeight:500,cursor:"pointer"}},"Submit")
        )
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
